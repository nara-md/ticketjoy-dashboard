<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/styles/style.css">
    <title>TicketJoy</title>
    <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon">
</head>

<body>
    <!-- Top Dashboard Header -->
    <header class="header">
        <h1>TicketJoy Dashboard 💙</h1>
        <p>Gerencie seus chamados com leveza e alegria</p>
    </header>

    <!-- Filter Buttons Bar -->
    <nav class="filter-group">
        <button id="allTickets" type="button">Todos</button>
        <button id="openTickets" type="button">Abertos</button>
        <button id="closedTickets" type="button">Fechados</button>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        
        <!-- New Ticket Form Panel -->
        <section class="form-card">
            <h2>Novo Ticket 📝</h2>
            <form class="ticket-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="newUser">Usuário</label>
                    <input type="text" id="newUser" placeholder="Nome do solicitante">
                </div>
                <div class="form-group">
                    <label for="newCategory">Categoria</label>
                    <input type="text" id="newCategory" placeholder="Categoria do problema">
                </div>
                <div class="form-group">
                    <label for="newPriority">Prioridade</label>
                    <select id="newPriority">
                        <option value="normal">Normal</option>
                        <option value="media">Média</option>
                        <option value="urgente">Urgente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newStatus">Status</label>
                    <select id="newStatus">
                        <option value="aberto">Aberto</option>
                        <option value="fechado">Fechado</option>
                    </select>
                </div>
                <button id="submitTicket" type="button">Enviar</button>
            </form>
        </section>

        <!-- Recent Tickets List Panel -->
        <section class="tickets-card">
            <h2>Tickets Recentes 📋</h2>
            <ul id="ticketList"></ul>
        </section>
        
    </main>

    <!-- Status Statistics Footer Panel -->
    <footer class="status-summary">
        <p id="statusText"></p>
    </footer>

    <!-- Application Script -->
    <script type="module" src="./assets/scripts/script.js"></script>
</body>

</html>
